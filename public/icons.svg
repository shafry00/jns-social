<svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
  <!-- Logo Icons -->
  <symbol id="logo-jns" viewBox="0 0 100 100">
    <defs>
      <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#3B82F6"/>
        <stop offset="100%" style="stop-color:#60A5FA"/>
      </linearGradient>
    </defs>
    <rect width="100" height="100" rx="20" fill="url(#logo-grad)"/>
    <text x="50" y="65" font-family="sans-serif" font-size="40" font-weight="700" fill="white" text-anchor="middle">JNS</text>
  </symbol>

  <!-- Bank Icons -->
  <symbol id="bank-bni" viewBox="0 0 60 60">
    <rect width="60" height="60" rx="8" fill="#EF4444"/>
    <text x="30" y="38" font-family="sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">BNI</text>
  </symbol>
  
  <symbol id="bank-mandiri" viewBox="0 0 60 60">
    <rect width="60" height="60" rx="8" fill="#0064D2"/>
    <text x="30" y="38" font-family="sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">MDR</text>
  </symbol>
  
  <symbol id="gopay" viewBox="0 0 60 60">
    <rect width="60" height="60" rx="8" fill="#00AA12"/>
    <text x="30" y="38" font-family="sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">GoPay</text>
  </symbol>
  
  <symbol id="dana" viewBox="0 0 60 60">
    <rect width="60" height="60" rx="8" fill="#0066FF"/>
    <text x="30" y="38" font-family="sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">DANA</text>
  </symbol>

  <!-- Payment Method Icons -->
  <symbol id="icon-wallet" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="2" y="6" width="20" height="14" rx="2"/>
    <line x1="2" y1="12" x2="22" y2="12"/>
  </symbol>
  
  <symbol id="icon-bank" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3"/>
  </symbol>
</svg>